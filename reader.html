<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta charset="UTF-8">
<title>Reader</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

/* TEXT */
#text {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1em;
  padding: 40px;
  text-align: center;
  box-sizing: border-box;
  user-select: none;
}

/* TAP ZONES */
.zone {
  position: fixed;
  top: 0;
  height: 100%;
}

#leftZone { left: 0; width: 25%; }
#rightZone { right: 0; width: 25%; }
#menuZone { left: 25%; width: 50%; }

/* MENU OVERLAY */
#menu {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

/* buttons */
button {
  -webkit-tap-highlight-color: transparent;
  outline: none;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* input */
input {
  -webkit-tap-highlight-color: transparent;
  outline: none;
  padding: 10px;
  width: 120px;
  text-align: center;
}

/* PAGE + STATUS BAR (UPDATED ADDITION) */
#statusBar {
  position: fixed;
  bottom: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.5;
  display: flex;
  gap: 10px;
}

/* tap feedback OFF */
.zone:active {
  background: rgba(255,255,255,0.0);
}
</style>
</head>

<body>

<div id="text"></div>

<!-- zones -->
<div id="leftZone" class="zone"></div>
<div id="menuZone" class="zone"></div>
<div id="rightZone" class="zone"></div>

<!-- MENU -->
<div id="menu">
  <button onclick="exitReader()">Exit</button>

  <div>
    <input type="number" id="pageInput" placeholder="Page">
    <button onclick="jumpPage()">Jump</button>
  </div>

  <button onclick="toggleMenu()">Close</button>
</div>

<!-- STATUS BAR (UPDATED ADDITION) -->
<div id="statusBar">
  <span id="pageMark"></span>
  <span id="time"></span>
  <span id="battery"></span>
</div>

<script>
let sentences = [];
let index = 0;

/* load text */
const raw = localStorage.getItem("bookText") || "";

/* split into sentences */
sentences = raw.match(/[^.!?]+[.!?]+/g) || [];

/* render */
function render() {
  document.getElementById("text").innerText =
    (sentences[index] || "").trim();

  document.getElementById("pageMark").innerText =
    `${index + 1} / ${sentences.length}`;
}

render();

/* navigation */
function next() {
  if (index < sentences.length - 1) {
    index++;
    render();
  }
}

function prev() {
  if (index > 0) {
    index--;
    render();
  }
}

/* menu toggle */
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display =
    menu.style.display === "flex" ? "none" : "flex";
}

/* exit */
function exitReader() {
  window.location.href = "main.html";
}

/* jump */
function jumpPage() {
  const val = parseInt(document.getElementById("pageInput").value);

  if (!isNaN(val) && val >= 1 && val <= sentences.length) {
    index = val - 1;
    render();
    toggleMenu();
  }
}

/* gestures */
document.getElementById("rightZone").onclick = next;
document.getElementById("leftZone").onclick = prev;
document.getElementById("menuZone").onclick = toggleMenu;

/* keyboard */
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
});

/* ========================= */
/* TIME (ADDED) */
/* ========================= */
function updateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  const date = now.toLocaleDateString();

  document.getElementById("time").innerText =
    `${time} • ${date}`;
}

setInterval(updateTime, 1000);
updateTime();

/* ========================= */
/* BATTERY (ADDED) */
/* ========================= */
function updateBattery() {
  if (!navigator.getBattery) return;

  navigator.getBattery().then(battery => {

    function update() {
      const level = Math.round(battery.level * 100);
      document.getElementById("battery").innerText =
        ` ${level}%`;
    }

    update();
    battery.addEventListener("levelchange", update);
  });
}

updateBattery();
</script>

</body>
</html>
